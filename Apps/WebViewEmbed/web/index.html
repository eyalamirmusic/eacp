<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Embedded WebView</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            background: #1e1e28;
            color: #e6e6f0;
        }
        h1 { margin: 0 0 1rem; }
        button {
            padding: 0.6rem 1rem;
            border-radius: 6px;
            border: 0;
            background: #5a6cff;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        #out { margin-top: 1rem; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Hello from an embedded resource.</h1>
    <p>This page and its script were bundled into the binary via ResEmbed.</p>
    <button id="ping">Run main.js</button>
    <div id="out"></div>
    <script src="main.js"></script>
</body>
</html>
