name: Publish Remote Signed Demo

on:
  workflow_dispatch:
    inputs:
      version:
        description: Demo app version to build and publish.
        required: true
        default: 1.0.0
      release_tag:
        description: GitHub Release tag for the signed remote demo.
        required: true
        default: remote-demo-v1
      include_hub:
        description: Publish a freshly built AppHub artifact as well as the Demo App.
        required: true
        default: 'true'
      publish_hub_update:
        description: Publish AppHub itself as a remote update instead of publishing the Demo App.
        required: true
        default: 'false'

permissions:
  contents: write

jobs:
  publish:
    name: Build, Sign, Publish, Smoke Install
    runs-on: macos-latest

    env:
      VERSION: ${{ inputs.version }}
      RELEASE_TAG: ${{ inputs.release_tag }}
      RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - uses: 1password/install-cli-action@v3

      - name: Capture existing hub artifact hash
        if: inputs.include_hub != 'true' && inputs.publish_hub_update != 'true'
        run: |
          set -euo pipefail
          mkdir -p dist/remote-signed-demo
          if gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern AppHub-remote-demo.app.zip \
            --dir dist/existing-hub >/dev/null 2>&1; then
            shasum -a 256 dist/existing-hub/AppHub-remote-demo.app.zip \
              | awk '{print $1}' > dist/remote-signed-demo/apphub-before.sha256
          else
            echo "No existing AppHub artifact found for app-only update." >&2
            exit 1
          fi

      - name: Build signed release assets
        if: inputs.include_hub == 'true' && inputs.publish_hub_update != 'true'
        run: >
          op run
          --env-file=.github/op/tamber-signing.env
          --
          node Scripts/package-remote-signed-demo-assets.mjs

      - name: Build and upload signed Demo App update
        if: inputs.include_hub != 'true' && inputs.publish_hub_update != 'true'
        run: >
          op run
          --env-file=.github/op/tamber-signing.env
          --
          node Scripts/publish-remote-demo-app-version.mjs

      - name: Build and upload signed AppHub update
        if: inputs.publish_hub_update == 'true'
        run: >
          op run
          --env-file=.github/op/tamber-signing.env
          --
          node Scripts/publish-remote-hub-version.mjs

      - name: Create or update release
        if: inputs.include_hub == 'true' && inputs.publish_hub_update != 'true'
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/remote-signed-demo/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/remote-signed-demo/* \
              --target "$GITHUB_SHA" \
              --title "Remote signed demo ${VERSION}" \
              --notes "Signed AppHub and Demo App ${VERSION} remote install smoke artifacts."
          fi

      - name: Verify hub artifact stayed unchanged
        if: inputs.include_hub != 'true' && inputs.publish_hub_update != 'true'
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern AppHub-remote-demo.app.zip \
            --dir dist/current-hub
          current="$(shasum -a 256 dist/current-hub/AppHub-remote-demo.app.zip | awk '{print $1}')"
          before="$(cat dist/remote-signed-demo/apphub-before.sha256)"
          test "$current" = "$before"
          echo "AppHub artifact unchanged: $current"

      - name: Smoke install Demo App from published internet artifacts
        if: inputs.publish_hub_update != 'true'
        run: |
          set -euo pipefail

          smoke_root="$(mktemp -d)"
          apphub_zip="${smoke_root}/AppHub-remote-demo.app.zip"
          manifest_url="${RELEASE_BASE_URL}/manifest.json"

          curl --fail --location --silent --show-error \
            "${RELEASE_BASE_URL}/AppHub-remote-demo.app.zip" \
            --output "$apphub_zip"

          ditto -x -k "$apphub_zip" "$smoke_root"
          codesign --verify --strict --verbose=2 "${smoke_root}/AppHub.app"
          codesign --verify --strict --verbose=2 \
            "${smoke_root}/AppHub.app/Contents/Library/LaunchServices/com.tamber.AppHub.PrivilegedHelper"

          "${smoke_root}/AppHub.app/Contents/MacOS/AppHub" bless-helper
          codesign --verify --strict --verbose=2 \
            /Library/PrivilegedHelperTools/com.tamber.AppHub.PrivilegedHelper

          "${smoke_root}/AppHub.app/Contents/MacOS/AppHub" \
            --root "${smoke_root}/hub-state" \
            remote-install \
            --manifest-url "$manifest_url"

          installed="/Applications/Tamber Local Update Demo.app/Contents/MacOS/Tamber Local Update Demo"
          test -x "$installed"
          installed_version="$("$installed" --version)"
          test "$installed_version" = "$VERSION"
          echo "Installed remote signed Demo App ${installed_version} from ${manifest_url}"

      - name: Smoke install AppHub from published internet artifacts
        if: inputs.publish_hub_update == 'true'
        run: |
          set -euo pipefail

          smoke_root="$(mktemp -d)"
          apphub_zip="${smoke_root}/AppHub-remote-demo.app.zip"
          manifest_url="${RELEASE_BASE_URL}/hub-manifest.json"

          curl --fail --location --silent --show-error \
            "${RELEASE_BASE_URL}/AppHub-remote-demo.app.zip" \
            --output "$apphub_zip"

          ditto -x -k "$apphub_zip" "$smoke_root"
          codesign --verify --strict --verbose=2 "${smoke_root}/AppHub.app"
          codesign --verify --strict --verbose=2 \
            "${smoke_root}/AppHub.app/Contents/Library/LaunchServices/com.tamber.AppHub.PrivilegedHelper"

          "${smoke_root}/AppHub.app/Contents/MacOS/AppHub" bless-helper
          codesign --verify --strict --verbose=2 \
            /Library/PrivilegedHelperTools/com.tamber.AppHub.PrivilegedHelper

          "${smoke_root}/AppHub.app/Contents/MacOS/AppHub" \
            --root "${smoke_root}/hub-state" \
            remote-install \
            --manifest-url "$manifest_url"

          installed="/Applications/AppHub.app/Contents/MacOS/AppHub"
          test -x "$installed"
          installed_version="$("$installed" --version)"
          test "$installed_version" = "$VERSION"
          codesign --verify --strict --verbose=2 /Applications/AppHub.app
          echo "Installed remote signed AppHub ${installed_version} from ${manifest_url}"
